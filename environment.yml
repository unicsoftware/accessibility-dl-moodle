# =====================================================================
# Repositório: accessibility-dl-moodle
# Arquivo: environment.yml
# Descrição: Ambiente Conda para reprodutibilidade do experimento.
# Uso: conda env create -f environment.yml
# =====================================================================

name: accessibility-dl-moodle
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - beautifulsoup4>=4.12
  - lxml>=4.9
  - jupyter>=1.0
  - ipykernel>=6.23
  - notebook>=7.0
  - pytest>=7.3
  - pytest-cov>=4.1
  - joblib>=1.2
  - tqdm>=4.65
  - loguru>=0.7
  - pyyaml>=6.0
  - python-dotenv>=1.0
  - pytorch::pytorch>=2.0
  - pytorch::cpuonly
  - pip:
    - torch>=2.0
    - imbalanced-learn>=0.10
