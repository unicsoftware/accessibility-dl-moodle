name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Tests & Sanity Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --max-line-length=120 --statistics || true

      - name: Generate small dataset (smoke test)
        run: |
          python dataset/synthetic/dataset_generator.py \
            --output dataset/raw/accessibility_dataset.csv \
            --samples 400 \
            --seed 42

      - name: Run tests
        run: |
          pytest -v tests/ --tb=short

      - name: Train logistic (smoke)
        run: |
          python -c "
          from src.dataset.loader import load_raw_dataset
          from src.dataset.split import load_and_split
          from src.dataset.preprocessing import preprocess_pipeline
          from src.models.logistic_regression import LogisticAccessibilityModel
          from src.evaluation.metrics import compute_classification_metrics
          import numpy as np

          df = load_raw_dataset()
          train_df, val_df, test_df = load_and_split(df, seed=42)
          X_tr, y_tr, sc, le = preprocess_pipeline(train_df, fit=True)
          X_te, y_te, _, _ = preprocess_pipeline(test_df, scaler=sc, fit=False)
          m = LogisticAccessibilityModel(random_state=42).fit(X_tr, y_tr)
          metrics = compute_classification_metrics(y_te, m.predict(X_te))
          print('OK logistic metrics:', metrics)
          "

  build:
    name: Build & Validate Artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Generate dataset
        run: |
          python dataset/synthetic/dataset_generator.py \
            --output dataset/raw/accessibility_dataset.csv \
            --samples 20000 \
            --seed 42

      - name: Train
        run: |
          python src/training/train_logistic.py
          python src/training/train_mlp.py --epochs 30

      - name: Evaluate
        run: |
          python src/evaluation/reports.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: experiment-artifacts
          path: |
            results/
            models/
